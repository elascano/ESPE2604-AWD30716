<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Unit 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
</nav>

<div class="container">
    <div id="alerts"></div>

    <div class="row">
        <div class="col-md-12 mb-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white border-0">
                    <h5 class="mb-0">Bank Management</h5>
                </div>
                <div class="card-body">
                    <form id="formBank" class="mb-8">
                        <div class="mb-2">
                            <input type="text" id="name" placeholder="Name" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" id="country" placeholder="Country" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <input type="number" id="clients" placeholder="Number of Clients " class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" id="owner" placeholder="Owner Name" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" id="phoneNumber" placeholder="Phone Number" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" id="dollarValue" placeholder="Value in Dollars" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label for="creationDate">Creation Date</label>
                            <input type="date" id="creationDate" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Register a New Bank</button>
                    </form>

                    <!-- Tabla Usuarios -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Id</th>
                                    <th>Name</th>
                                    <th>Country</th>
                                    <th>Clients</th>
                                    <th>Owner</th>
                                    <th>Phone Number</th>
                                    <th>Dollar Value</th>
                                    <th>Creation Date</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
