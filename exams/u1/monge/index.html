<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD JS Frontend</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">Gestión de Parques</a>
  </div>
</nav>

<div class="container">
    <div id="alerts"></div>

    <div class="row">
        <!-- Panel de Parques -->
        <div class="col-md-12 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white border-0">
                    <h5 class="mb-0">Gestión de Parques</h5>
                </div>
                <div class="card-body">
                    <!-- Formulario Parques -->
                    <form id="formPark" class="mb-4">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <input type="text" id="parkName" placeholder="Nombre del Parque" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <input type="text" id="city" placeholder="Ciudad" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <input type="text" id="province" placeholder="Provincia" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <input type="number" id="capacity" placeholder="Capacidad" class="form-control" required min="1">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <input type="text" id="managerName" placeholder="Nombre del Gerente" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-2 d-flex align-items-center">
                                <div class="form-check me-3">
                                    <input class="form-check-input" type="checkbox" id="kidsAllowed">
                                    <label class="form-check-label" for="kidsAllowed">
                                        Niños Permitidos
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="petsAllowed">
                                    <label class="form-check-label" for="petsAllowed">
                                        Mascotas Permitidas
                                    </label>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrar Parque</button>
                    </form>

                    <!-- Tabla Parques -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Ciudad</th>
                                    <th>Provincia</th>
                                    <th>Capacidad</th>
                                    <th>Niños</th>
                                    <th>Mascotas</th>
                                    <th>Gerente</th>
                                    <th class="text-end">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="parksTableBody">
                                <!-- Llenado por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
