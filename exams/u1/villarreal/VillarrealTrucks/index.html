<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> Truck Management System</h1>
        </header>

        <div class="layout">
            <section class="card" id="insert-section">
                <h2>Insert Truck</h2>
                <form id="truck-form" novalidate>
                    <div class="form-grid">
                        <div class="field">
                            <label for="license_plate">License Plate *</label>
                            <input type="text" id="license_plate" required placeholder="e.g. ABC-1234">
                        </div>
                        <div class="field">
                            <label for="brand">Brand *</label>
                            <input type="text" id="brand" required placeholder="e.g. Volvo">
                        </div>
                        <div class="field">
                            <label for="model">Model *</label>
                            <input type="text" id="model" required placeholder="e.g. FH16">
                        </div>
                        <div class="field">
                            <label for="year">Year *</label>
                            <input type="number" id="year" min="1990" max="2030" required placeholder="e.g. 2022">
                        </div>
                        <div class="field">
                            <label for="capacity_tons">Capacity (tons) *</label>
                            <input type="number" id="capacity_tons" min="0.1" step="0.01" required placeholder="e.g. 18.5">
                        </div>
                        <div class="field">
                            <label for="fuel_type">Fuel Type *</label>
                            <select id="fuel_type" required>
                                <option value="">-- Select --</option>
                                <option value="Diesel">Diesel</option>
                                <option value="Gasoline">Gasoline</option>
                                <option value="Electric">Electric</option>
                                <option value="CNG">CNG</option>
                                <option value="Hybrid">Hybrid</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="driver_name">Driver Name *</label>
                            <input type="text" id="driver_name" required placeholder="e.g. Carlos Pérez">
                        </div>
                        <div class="field">
                            <label for="last_maintenance_date">Last Maintenance *</label>
                            <input type="date" id="last_maintenance_date" required>
                        </div>
                        <div class="field">
                            <label for="status">Status *</label>
                            <select id="status" required>
                                <option value="Active">Active</option>
                                <option value="In Maintenance">In Maintenance</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Register Truck</button>
                    <p id="form-feedback" class="feedback"></p>
                </form>
            </section>

            <section class="card" id="search-section">
                <h2>Search Trucks</h2>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search by plate, brand, model, driver...">
                    <button id="search-btn" class="btn btn-secondary">Search</button>
                    <button id="clear-btn" class="btn btn-outline">Clear</button>
                </div>
                <div id="search-results"></div>
            </section>
        </div>

        <section class="card" id="list-section">
            <h2>Fleet Inventory
                <button id="refresh-btn" class="btn btn-outline btn-sm"> Refresh</button>
                <span id="truck-count" class="badge"></span>
            </h2>
            <div id="truck-list">
                <p class="loading">Loading trucks...</p>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
