<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Stellar Singers | Registro</title>
</head>

<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <h1>Stellar Singers</h1>
        <p class="subtitle">Registra un nuevo talento musical</p>

        <form id="registroForm" class="campo_formulario">
            <div class="form-grid">
                <div class="input-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="input-group">
                    <label for="stage_name">Nombre Artístico</label>
                    <input type="text" id="stage_name" name="stage_name" required>
                </div>

                <div class="input-group">
                    <label for="genre">Género Musical</label>
                    <input type="text" id="genre" name="genre" required>
                </div>

                <div class="input-group">
                    <label for="debut_year">Año de Debut</label>
                    <input type="number" id="debut_year" name="debut_year" min="1900" max="2026" required>
                </div>

                <div class="input-group">
                    <label for="albums">Álbumes Lanzados</label>
                    <input type="number" id="albums" name="albums" min="0" required>
                </div>

                <div class="input-group">
                    <label for="listeners">Oyentes Mensuales</label>
                    <input type="number" id="listeners" name="listeners" min="0" required>
                </div>

                <div class="input-group">
                    <label for="awards">Premios Ganados</label>
                    <input type="number" id="awards" name="awards" min="0" required>
                </div>

                <div class="input-group">
                    <label for="country">País de Origen</label>
                    <input type="text" id="country" name="country" required>
                </div>
            </div>

            <button type="submit" class="glow-on-hover">Registrar Artista</button>
            <div id="mensaje" class="mensaje-box hidden"></div>
        </form>

        <div class="links-container">
            <a href="listado.html" class="nav-link">
                <span>Ver Tabla</span>

            </a>
        </div>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                stage_name: document.getElementById('stage_name').value,
                genre: document.getElementById('genre').value,
                debut_year: document.getElementById('debut_year').value,
                albums: document.getElementById('albums').value,
                listeners: document.getElementById('listeners').value,
                awards: document.getElementById('awards').value,
                country: document.getElementById('country').value
            };

            const mensajeDiv = document.getElementById('mensaje');
            const submitBtn = document.querySelector('button[type="submit"]');

            mensajeDiv.className = 'mensaje-box info';
            mensajeDiv.innerText = 'Transmitting data to the stars...';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Registrando...';

            try {
                const response = await fetch('/api/guardar.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();

                if (response.ok) {
                    mensajeDiv.className = 'mensaje-box success';
                    mensajeDiv.innerText = data.message || 'Artista registrado exitosamente!';
                    document.getElementById('registroForm').reset();
                } else {
                    mensajeDiv.className = 'mensaje-box error';
                    mensajeDiv.innerText = data.error || 'Error en el sistema';
                }
            } catch (error) {
                mensajeDiv.className = 'mensaje-box error';
                mensajeDiv.innerText = 'Fallo de conexión galáctica.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Registrar Artista';
                setTimeout(() => {
                    if (mensajeDiv.classList.contains('success')) {
                        mensajeDiv.className = 'mensaje-box hidden';
                    }
                }, 4000);
            }
        });
    </script>
</body>

</html>
