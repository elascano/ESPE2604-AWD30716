<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Stellar Singers | Salón de la Fama</title>
</head>

<body class="list-body">
    <div class="background-animation"></div>

    <div class="container-wide">
        <div class="header-action">
            <a href="index.html" class="nav-link back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>Nuevo Registro</span>
            </a>
            <h1>Salón de la Fama</h1>
            <div class="spacer"></div>
        </div>

        <div class="table-container">
            <table id="tablaUsuarios">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Artístico</th>
                        <th>Género</th>
                        <th>País</th>
                        <th>Álbumes</th>
                        <th>Oyentes (M)</th>
                        <th>Premios</th>
                        <th>Debut</th>
                        <th>Años Actividad</th>
                        <th>Premios/Año</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="11" class="loading-cell">Cargando estrellas...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function cargarUsuarios() {
            const tabla = document.getElementById('tablaUsuarios').querySelector('tbody');
            try {
                const res = await fetch('/api/listar.php');
                const usuarios = await res.json();
                tabla.innerHTML = '';

                if (usuarios.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="11" class="empty-cell">El universo está vacío. Registra al primer artista.</td></tr>';
                } else {
                    const currentYear = new Date().getFullYear();

                    usuarios.forEach(u => {
                        // Computed value: Años de Actividad
                        let yearsActive = "Desconocido";
                        let activeYearsNum = 1;
                        if (u.debut_year) {
                            yearsActive = currentYear - parseInt(u.debut_year);
                            if (yearsActive < 0) yearsActive = 0;
                            activeYearsNum = Math.max(1, yearsActive);
                        }

                        // Computed value: Premios por año
                        let awardsPerYear = u.awards ? (parseInt(u.awards) / activeYearsNum).toFixed(1) : '0.0';

                        // Format listeners for readability (e.g. 10.5M)
                        let formattedListeners = u.listeners ? (parseInt(u.listeners) / 1000000).toFixed(1) + 'M' : 'N/A';

                        tabla.innerHTML += `<tr>
                        <td><div class="td-content main-text">${u.name || '-'}</div></td>
                        <td><div class="td-content highlight-text">${u.stage_name || '-'}</div></td>
                        <td><div class="td-content badge">${u.genre || '-'}</div></td>
                        <td><div class="td-content">${u.country || '-'}</div></td>
                        <td><div class="td-content number-cell">${u.albums || '0'}</div></td>
                        <td><div class="td-content number-cell">${formattedListeners}</div></td>
                        <td><div class="td-content number-cell">${u.awards || '0'}</div></td>
                        <td><div class="td-content">${u.debut_year || '-'}</div></td>
                        <td><div class="td-content computed-cell">${yearsActive} años</div></td>
                        <td><div class="td-content computed-cell highlight-text">${awardsPerYear}</div></td>
                        <td>
                            <div class="td-content">
                                <button onclick="eliminarUsuario('${u._id}')" onmouseover="this.style.background='#ff4c4c'; this.style.color='white'" onmouseout="this.style.background='rgba(255, 76, 76, 0.1)'; this.style.color='#ff4c4c'" style="background: rgba(255, 76, 76, 0.1); border: 1px solid #ff4c4c; color: #ff4c4c; padding: 5px 10px; border-radius: 5px; cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 0.9em;">Eliminar</button>
                            </div>
                        </td>
                    </tr>`;
                    });
                }
            } catch {
                tabla.innerHTML = '<tr><td colspan="11" class="error-cell">Error de conexión galáctica. No se pudieron cargar los datos.</td></tr>';
            }
        }

        async function eliminarUsuario(id) {
            if (confirm("¿Estás seguro de que deseas eliminar esta estrella de la galaxia?")) {
                try {
                    const response = await fetch('/api/eliminar.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: id })
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        cargarUsuarios(); // Recargar la tabla
                    } else {
                        alert(data.error || 'Error al eliminar');
                    }
                } catch (error) {
                    alert('Fallo de conexión al intentar eliminar.');
                }
            }
        }

        window.onload = cargarUsuarios;
    </script>
</body>

</html>
