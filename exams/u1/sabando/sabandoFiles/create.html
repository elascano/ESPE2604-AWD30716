<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Professor</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="topbar">
        <div>Professor Management System</div>
    </header>

    <main class="content">
        <a href="./index.html" style="color: var(--primary-color); text-decoration: none; margin-bottom: 1rem; display: inline-block;">&larr; Back to List</a>
        
        <div class="form-container">
            <h2>Add New Professor</h2>
            <form id="createProfessorForm">
                <div>
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                
                <div>
                    <label for="age">Age *</label>
                    <input type="number" id="age" name="age" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem;">
                </div>

                <div>
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem;">
                </div>

                <div>
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone">
                </div>

                <div>
                    <label for="salary">Salary ($) *</label>
                    <input type="number" step="0.01" id="salary" name="salary" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem;">
                </div>

                <div>
                    <label for="department">Department *</label>
                    <input type="text" id="department" name="department" required>
                </div>

                <div>
                    <label for="hireDate">Hire Date *</label>
                    <input type="date" id="hireDate" name="hireDate" required>
                </div>

                <div>
                    <label for="officeLocation">Office Location</label>
                    <input type="text" id="officeLocation" name="officeLocation">
                </div>

                <button type="submit" style="margin-top: 1rem;">Save Professor</button>
            </form>
            <div id="formMessage" style="margin-top: 1rem; text-align: center; font-weight: 500;"></div>
        </div>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
