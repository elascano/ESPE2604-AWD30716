<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Management</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="topbar">
        <div>Professor Management System</div>
    </header>

    <main class="content">
        <h1>Professors List</h1>
        <p>Manage and view all registered professors.</p>

        <section class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Current Staff</h2>
                <a href="./create.html" style="background-color: var(--primary-color); color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 0.5rem;">+ Add Professor</a>
            </div>

            <div style="overflow-x: auto;">
                <table id="professorsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Department</th>
                            <th>Email</th>
                            <th>Hire Date</th>
                            <th>Bonus (Computed)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" style="text-align: center;">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
