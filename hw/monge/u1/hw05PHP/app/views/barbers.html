<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Barbero</title>
    <link rel="stylesheet" href="../../public/assets/css/styles.css">
</head>
<body>
    <header class="header">
        <img
            src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3"
            alt="Logo Barberia"
            class="logo"
        >
        <h1>Panel de Administracion</h1>
    </header>

    <main class="content">
        <h2>Crear Nuevo Barbero</h2>

        <form>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required>

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" required>

            <label for="telefono">Telefono</label>
            <input type="tel" id="telefono" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="especialidad">Especialidad</label>
            <input type="text" id="especialidad">

            <label for="experiencia">Anos de experiencia</label>
            <input type="number" id="experiencia" min="0">

            <label for="horario_inicio">Horario inicio</label>
            <input type="time" id="horario_inicio" required>

            <label for="horario_fin">Horario fin</label>
            <input type="time" id="horario_fin" required>

            <label for="estado">Estado</label>
            <select id="estado">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
            </select>

            <button type="button" onclick="alert('Barbero registrado localmente (sin backend por ahora).')">
                Guardar Barbero
            </button>
        </form>

        <a href="index.html" class="return">Volver al inicio</a>
    </main>
</body>
</html>
