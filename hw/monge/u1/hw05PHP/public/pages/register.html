<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="../assets/css/forms.css">
</head>
<body>
    <header class="page-header">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo Barberia" class="brand-logo">
        <h1>Registro</h1>
    </header>

    <main class="main-content">
        <h2>Crear Nuevo Usuario</h2>
        <form class="input-form" id="registerForm">
            <label for="name" class="form-label">Nombre Completo</label>
            <input type="text" id="name" class="form-input" required>

            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" id="email" class="form-input" required>

            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-input" required>

            <button type="submit" class="form-button">Registrarse</button>
        </form>
        <div id="registerMessage" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
        <a href="../index.html" class="back-link">Volver al inicio</a>
    </main>

    <!-- Importar script de JS como módulo para poder usar import dentro de él -->
    <script type="module" src="../assets/js/users.js"></script>
</body>
</html>
