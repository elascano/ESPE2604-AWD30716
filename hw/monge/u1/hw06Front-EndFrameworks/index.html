<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD JS Frontend</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">CRUD Avanzado (HTML + JS + PHP)</a>
  </div>
</nav>

<div class="container">
    <div id="alerts"></div>

    <div class="row">
        <!-- Panel de Usuarios -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white border-0">
                    <h5 class="mb-0">Gestión de Usuarios</h5>
                </div>
                <div class="card-body">
                    <!-- Formulario Usuarios -->
                    <form id="formUser" class="mb-4">
                        <div class="mb-2">
                            <input type="text" id="userName" placeholder="Nombre completo" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <input type="email" id="userEmail" placeholder="Correo electrónico" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrar Usuario</button>
                    </form>

                    <!-- Tabla Usuarios -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th class="text-end">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Llenado por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel de Posts -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white border-0">
                    <h5 class="mb-0">Gestión de Posts</h5>
                </div>
                <div class="card-body">
                    <!-- Formulario Posts -->
                    <form id="formPost" class="mb-4">
                        <div class="mb-2">
                            <input type="text" id="postTitle" placeholder="Título del Post" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <textarea id="postContent" placeholder="Escribe el contenido..." class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-2">
                            <select id="postUserId" class="form-select" required>
                                <option value="">Selecciona el autor...</option>
                                <!-- Llenado por JS -->
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Publicar Post</button>
                    </form>

                    <!-- Tabla Posts -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Título</th>
                                    <th>Autor</th>
                                    <th class="text-end">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="postsTableBody">
                                <!-- Llenado por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
