<div class="row">
    <div class="col-lg-12 col-xlg-9 col-md-7">
        <div class="card">
            <div class="card-body">
                <form class="form-horizontal form-material mx-2">
                    <div class="form-group">
                        <label class="col-md-12 mb-2">Nombres Completos</label>
                        <div class="col-md-12">
                            <input type="text" placeholder="Ricardo Monge" class="form-control ps-0 form-control-line"
                                required id="form_nombres_completos">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-md-12 mb-0">Calificacion</label>
                        <div class="col-md-12">
                            <input type="number" class="form-control" id="calificacion" name="calificacion" step="0.1"
                                min="0" max="10" placeholder="0 - 10" required itemid="form_calificacion">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-md-12 mb-0">Message</label>
                        <div class="col-md-12">
                            <textarea rows="5" class="form-control ps-0 form-control-line"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-12 d-flex">
                            <button class="btn btn-success mx-auto mx-md-0 text-white" id="btn_agregar_estudiante">
                                Agregar Estudiante
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Column -->
</div>
