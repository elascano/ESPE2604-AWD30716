<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar"><a href="../../../index.html" class="logo">FLOVA</a></nav>
    <form onsubmit="submitPatient(event)">
        <h2>New Patient Registration</h2>
        <label>DNI</label><input type="text" id="dni" required>
        <label>Full Name</label><input type="text" id="full_name" required>
        <label>Email</label><input type="email" id="email" required>
        <button type="submit" class="btn-primary">Submit Record</button>
    </form>
    <script src="../../js/app.js"></script>
</body>
</html>
