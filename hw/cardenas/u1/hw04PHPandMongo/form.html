<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mongodb homework</title>
    <link rel="stylesheet" href="./public/css/form.css">
</head>

<body>
    <header>
        <h1>Student's Form</h1>
    </header>
    <main>
        <div class="form-container">
            <h2>Please write your information in this form and then clic the button: "Submit"</h2>
            <form action="./public/php/save_student.php" method="POST">
                <label for="studentFullName">Full Name:</label>
                <input type="text" id="studentFullName" name="studentFullName" required>

                <label for="studentAge">Age:</label>
                <input type="number" id="studentAge" name="studentAge" min="0" required>

                <label for="studentEmail">Email:</label>
                <input type="email" id="studentEmail" name="studentEmail" pattern=".+\.com$" required>

                <label for="studentCodingPrefer">What do you prefer coding?</label>
                <select name="studentCodingPrefer" id="studentCodingPrefer">
                    <option value="html" selected>HTML</option>
                    <option value="css">CSS</option>
                    <option value="javascript">JAVASCRIPT</option>
                </select>

                <button type="submit" id="submitButton">Submit</button>
            </form>
        </div>

    </main>
    <footer>
        <p>Made by Andrés Cárdenas</p>
    </footer>

</body>

</html>
