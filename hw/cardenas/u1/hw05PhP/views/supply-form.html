<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Insumos</title>
    <link rel="stylesheet" href="../public/css/forms.css">
</head>

<body>

    <header>
        <h1>Fábula Dental</h1>
    </header>

    <main class="form-container">
        <div class="form-card">
            <h2>Registro de Nuevo Insumo</h2>

            <form action="../public/php/save-supply.php" method="post" class="form-grid">

                <div class="input-group full-width">
                    <label for="productName">Nombre del Producto / Medicamento</label>
                    <input type="text" id="productName" name="productName" placeholder="Ej. Resina Compuesta 3M"
                        required>
                </div>

                <div class="input-group">
                    <label for="productCode">Código Interno</label>
                    <input type="text" id="productCode" name="productCode" placeholder="Ej. RES-001" required>
                </div>

                <div class="input-group">
                    <label for="productInitialQuantity">Cantidad Inicial</label>
                    <input type="number" id="productInitialQuantity" name="productInitialQuantity" min="1"
                        placeholder="Ej. 10" required>
                </div>

                <div class="input-group">
                    <label for="productUnitCost">Costo Unitario ($)</label>
                    <input type="number" id="productUnitCost" name="productUnitCost" min="0.01" step="0.01"
                        placeholder="Ej. 5.50" required>
                </div>

                <div class="input-group">
                    <label for="productPurchaseDate">Fecha de Compra</label>
                    <input type="date" id="productPurchaseDate" name="productPurchaseDate" required>
                </div>

                <div class="input-group">
                    <label for="productExpirationDate">Fecha de Caducidad</label>
                    <input type="date" id="productExpirationDate" name="productExpirationDate" required>
                </div>

                <div class="input-group full-width">
                    <button type="submit" class="btn btn-primary">Guardar Insumo en Inventario</button>
                </div>

                <a href="supply-list.html" class="input-group full-width">
                    Ver Lista de Suplementos
                </a>
        </div>

        </form>
        </div>
    </main>

    <footer style="text-align:center; padding:15px;">
        <p>&copy; 2026 Fábula Dental - Odontología Pediátrica.</p>
    </footer>

</body>

</html>
