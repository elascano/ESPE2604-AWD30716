<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Records</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="loadPatients()">
    <nav class="navbar"><a href="../../../index.html" class="logo">FLOVA</a></nav>
    <div class="data-container">
        <h2>Registered Patients</h2>
        <input type="text" id="searchInput" class="search-bar" onkeyup="filterTable()" placeholder="Search records...">
        <table>
            <thead><tr><th>DNI</th><th>Full Name</th><th>Email</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="../../js/app.js"></script>
</body>
</html>
