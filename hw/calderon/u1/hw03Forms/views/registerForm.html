<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../public/css/styleForms.css">
    <link rel="stylesheet" href="../public/css/style_menu.css">
    <script src="../public/js/registerValidation.js"></script>
</head>

<body>

<header>
    <div class="logo">LOGO</div>
    <div class="separator"></div>
    <nav>
        <a href="../index.html">Main</a>
        <a href="menu.html">Menu</a>
        <a href="#">about us</a>
        <a href="#">locations</a>
        <a href="#">log In</a>
        <a href="#">counter</a>
    </nav>
</header>

<div id="content-spa" class="form-container">
    
    <div class="form-box">
        <h1>Nuevo Usuario</h1>

        <form method="post" action="php/usuario/insercion.php" onsubmit="validateAndSubmitForm(event)">
            
            <fieldset class="form-section">
                <legend>DATOS PERSONALES</legend>
                
                <div class="form-group">
                    <label>Nombres:</label>
                    <input type="text" name="first_name" required>
                </div>

                <div class="form-group">
                    <label>Apellidos:</label>
                    <input type="text" name="last_name" required>
                </div>

                <div class="form-group">
                    <label>Cédula:</label>
                    <input type="text" name="id_number" id="id_number" maxlength="10" required pattern="[0-9]{10}">
                    <small id="idError" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label>F. Nacimiento:</label>
                    <input type="date" name="birth_date" id="birth_date" onchange="calculateAge()" required>
                </div>

                <div class="form-group">
                    <label>Edad:</label>
                    <input type="text" name="age" id="age" readonly class="readonly">
                </div>

                <div class="form-group">
                    <label>Dirección:</label>
                    <input type="text" name="address">
                </div>

                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" name="phone" maxlength="10">
                </div>
            </fieldset>

            <div class="form-actions">
                <input type="submit" value="Registrar" class="btn btn-primary">
                <button type="button" onclick="cargarTab('paginas/visualizacionUs.php')" class="btn btn-danger">
                    Cancelar
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
