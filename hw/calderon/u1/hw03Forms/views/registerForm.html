<div id="contenido-spa" class="form-container">
    
    <div class="form-box">
        <h1>Nuevo Usuario</h1>

        <form method="post" action="php/usuario/insercion.php" onsubmit="validarYEnviarVertical(event)">
            
            <fieldset class="form-section">
                <legend>DATOS PERSONALES</legend>
                
                <div class="form-group">
                    <label>Nombres:</label>
                    <input type="text" name="nombre" required>
                </div>

                <div class="form-group">
                    <label>Apellidos:</label>
                    <input type="text" name="apellido" required>
                </div>

                <div class="form-group">
                    <label>Cédula:</label>
                    <input type="text" name="cedula" id="cedula_input" maxlength="10" required>
                </div>

                <div class="form-group">
                    <label>F. Nacimiento:</label>
                    <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" onchange="calcularEdad()" required>
                </div>

                <div class="form-group">
                    <label>Edad:</label>
                    <input type="text" name="edad" id="edad" readonly class="readonly">
                </div>

                <div class="form-group">
                    <label>Dirección:</label>
                    <input type="text" name="direccion">
                </div>

                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" name="telefono" maxlength="10">
                </div>
            </fieldset>
            <div class="form-actions">
                <input type="submit" value="Registrar" class="btn btn-primary">
                <button type="button" onclick="cargarTab('paginas/visualizacionUs.php')" class="btn btn-danger">
                    Cancelar
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
