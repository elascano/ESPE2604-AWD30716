<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../public/css/styleForms.css">
    <link rel="stylesheet" href="../public/css/style_menu.css">
    <title>Encuesta de Satisfacción</title>
</head>

<body>

<header>
    <div class="logo">LOGO</div>
    <div class="separator"></div>
    <nav>
        <a href="../index.html">Main</a>
        <a href="menu.html">Menu</a>
        <a href="#">about us</a>
        <a href="#">locations</a>
        <a href="#">log In</a>
        <a href="#">counter</a>
    </nav>
</header>

<div id="contenido-spa" class="form-container">

    <div class="form-box">
        <h1>Encuesta de Satisfacción</h1>

        <form method="post" action="php/survey/insert.php">

            <fieldset class="form-section">
                <legend>DATOS DEL CLIENTE</legend>

                <div class="form-group">
                    <label>Nombres:</label>
                    <input type="text" name="first_name" required>
                </div>

                <div class="form-group">
                    <label>Apellidos:</label>
                    <input type="text" name="last_name">
                </div>

                <div class="form-group">
                    <label>Correo:</label>
                    <input type="email" name="email">
                </div>

                <div class="form-group">
                    <label>Fecha de visita:</label>
                    <input type="date" name="visit_date" required>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>EVALUACIÓN</legend>

                <div class="form-group">
                    <label>Calidad de comida:</label>
                    <select name="food_quality" required>
                        <option value="">Seleccionar</option>
                        <option value="5">Excelente</option>
                        <option value="4">Muy Buena</option>
                        <option value="3">Buena</option>
                        <option value="2">Regular</option>
                        <option value="1">Mala</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Atención:</label>
                    <select name="service_quality" required>
                        <option value="">Seleccionar</option>
                        <option value="5">Excelente</option>
                        <option value="4">Muy Buena</option>
                        <option value="3">Buena</option>
                        <option value="2">Regular</option>
                        <option value="1">Mala</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Limpieza:</label>
                    <select name="cleanliness" required>
                        <option value="">Seleccionar</option>
                        <option value="5">Excelente</option>
                        <option value="4">Muy Buena</option>
                        <option value="3">Buena</option>
                        <option value="2">Regular</option>
                        <option value="1">Mala</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>¿Nos recomendaría?</label>
                    <select name="recommendation" required>
                        <option value="">Seleccionar</option>
                        <option value="yes">Sí</option>
                        <option value="no">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Comentarios:</label>
                    <input type="text" name="comments">
                </div>

            </fieldset>

            <div class="form-actions">
                <input type="submit" value="Enviar" class="btn btn-primary">

                <button type="button" class="btn btn-danger">
                    Cancelar
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
