<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Login | Sistema de Gestión de Usuarios</title>

<link rel="stylesheet" href="../estilos/core.min.css">

<style>
  body {
    background-color: #f4f6f9;
  }

  .login-card {
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    background: #fff;
    padding: 2rem;
  }

  footer {
    background-color: #0d6efd;
    color: #fff;
  }
</style>
</head>

<body>

<section class="vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center align-items-center">

      <div class="col-lg-6 d-none d-lg-block">
        <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp"
             class="img-fluid" alt="Login">
      </div>

      <div class="col-lg-5">
        <div class="login-card">

          <h3 class="text-center mb-4">Inicio de Sesión</h3>

          <form action="../server/validar_login.php" method="POST">

            <!-- Usuario -->
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="usuario" class="form-control"
                     placeholder="Ingrese su usuario" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="clave" class="form-control"
                     placeholder="Ingrese su contraseña" required>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                Ingresar
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</section>

<footer class="py-3 text-center">
  <div>
    Sistema de Gestión de Usuarios © 2026
  </div>
  <small>
    Versión 1.0 | Soporte: daalvarado5@espe.edu.ec
  </small>
</footer>

</body>
</html>
