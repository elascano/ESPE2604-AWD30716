<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Registration - Fábula Dental</title>
    <link rel="stylesheet" href="../public/css/forms.css">
    
</head>
<body>

<header>
    <h1>Fábula Dental</h1>
    <h2>Specialists in Children's Smiles</h2>
</header>

<main class="form-container">
    <div class="form-card">
        <h2>Registro de Nuevo Abono</h2>

        <form id="paymentForm">
            <div class="form-grid">

                <div class="input-group full-width">
                    <label for="patientId">Cédula del Paciente</label>
                    <input type="text" id="patientId" name="patientId" required pattern="[0-9]{10}" placeholder="Ej: 1727095414">
                </div>

                <div class="input-group">
                    <label for="paymentAmount">Monto a abonar ($)</label>
                    <input type="number" id="paymentAmount" name="paymentAmount" required min="0.01" step="0.01" placeholder="Ej: 50.00">
                </div>

                <div class="input-group">
                    <label for="paymentDate">Fecha de Pago</label>
                    <input type="date" id="paymentDate" name="paymentDate" required>
                </div>

                <div class="input-group full-width">
                    <label for="paymentMethod">Método de Pago</label>
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="">Seleccione un método</option>
                        <option value="cash">Efectivo</option>
                        <option value="transfer">Transferencia</option>
                        <option value="card">Tarjeta de Crédito / Débito</option>
                    </select>
                </div>

                <div class="full-width">
                    <button type="submit" class="btn btn-primary">Registrar Abono</button>
                </div>

                <div class="full-width actions-row">
                    <a href="./payment-list.html" class="btn btn-secondary">Ver pagos registrados</a>
                </div>

            </div>
        </form>
    </div>
</main>

<footer style="text-align:center; padding:15px;">
    <p>&copy; 2026 Fábula Dental - Odontología Pediátrica.</p>
</footer>

<script src="../public/js/payment-form.js"></script>

</body>
</html>
