<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Student</title>
    <link rel="stylesheet" href="../public/student.css">
</head>
<body>
    <div class="form-container">
        <h2>Register New Student</h2>
        
        <form id="studentForm" action="../php/register_student.php" method="POST">
            
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="first_name" pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed" required placeholder="Patricio">
            </div>

            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="last_name" pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed" required placeholder="Landazuri">
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="date_of_birth" min="1980-01-01" required>
            </div>

            <div class="form-group">
                <label for="address">Home Address:</label>
                <input type="text" id="address" name="address" pattern="[A-Za-z0-9\s,.-]+" title="Please enter a valid address (letters and numbers)" required placeholder=" Antonio Tandazo street 32">
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required title="Please enter a valid email" placeholder="patricio.landazuri@example.com">
            </div>

            <button type="submit" class="btn-submit">Submit Registration</button>
        </form>
        
        <a href="index.html" class="back-link">Return to Home</a>
    </div>

    <script>
        const dobInput = document.getElementById('dob');
        const today = new Date().toISOString().split('T')[0];
        dobInput.setAttribute('max', today);

        document.getElementById('studentForm').addEventListener('submit', function(event) {
            let isValid = true;
            let errorMessage = "";

            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const dobValue = dobInput.value;
            const address = document.getElementById('address').value;
            const emailInput = document.getElementById('email').value;

            const lettersOnlyRegex = /^[A-Za-z\s]+$/;
            const addressRegex = /^[A-Za-z0-9\s,.-]+$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!lettersOnlyRegex.test(firstName) || !lettersOnlyRegex.test(lastName)) {
                errorMessage += "- First Name and Last Name must contain only letters.\n";
                isValid = false;
            }

            if (dobValue > today) {
                errorMessage += "- Date of Birth is invalid (cannot be a future date).\n";
                isValid = false;
            } else if (dobValue < "1980-01-01") {
                errorMessage += "- Date of Birth must be from 1980 onwards.\n";
                isValid = false;
            }

            if (!addressRegex.test(address)) {
                errorMessage += "- Address must contain valid characters (letters and numbers).\n";
                isValid = false;
            }

            if (!emailRegex.test(emailInput)) {
                errorMessage += "- Please check the email format.\n";
                isValid = false;
            }

            if (!isValid) {
                alert('Please fix the following errors:\n\n' + errorMessage);
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
