<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Users Table</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- DataTables Bootstrap 5 CSS -->
    <link 
        href="https://cdn.datatables.net/2.3.4/css/dataTables.bootstrap5.min.css" 
        rel="stylesheet"
    >

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="page-wrapper">
        <div class="container py-5">

            <div class="text-center mb-4">
                <h1 class="fw-bold">
                    Personal Users Table
                </h1>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-dark text-white d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                    <div>
                        <h2 class="h5 mb-0">
                            Users Records
                        </h2>
                    </div>

                    <button id="reloadButton" class="btn btn-light btn-sm">
                        Reload data
                    </button>
                </div>

                <div class="card-body p-4">

                    <div id="loadingMessage" class="alert alert-info">
                        Loading data from API...
                    </div>

                    <div id="errorMessage" class="alert alert-danger d-none">
                        Could not load data from the API.
                    </div>

                    <div class="table-responsive">
                        <table id="usersTable" class="table table-striped table-hover table-bordered align-middle w-100">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Full Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Username</th>
                                    <th>Gender</th>
                                </tr>
                            </thead>

                            <tbody>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- jQuery -->
    <script 
        src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <!-- DataTables JS -->
    <script 
        src="https://cdn.datatables.net/2.3.4/js/dataTables.min.js">
    </script>

    <!-- DataTables Bootstrap 5 JS -->
    <script 
        src="https://cdn.datatables.net/2.3.4/js/dataTables.bootstrap5.min.js">
    </script>

    <script src="js/user_table.js"></script>

</body>
</html>
