<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Barbero</title>
    <link rel="stylesheet" href="../assets/css/forms.css">
</head>
<body>
    <header class="page-header">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo Barberia" class="brand-logo">
        <h1>Panel de Administracion</h1>
    </header>

    <main class="main-content">
        <h2>Crear Nuevo Barbero</h2>
        <form class="input-form">
            <label for="firstName" class="form-label">Nombre</label>
            <input type="text" id="firstName" class="form-input" required>

            <label for="lastName" class="form-label">Apellido</label>
            <input type="text" id="lastName" class="form-input" required>

            <label for="phoneNumber" class="form-label">Telefono</label>
            <input type="tel" id="phoneNumber" class="form-input" required>

            <label for="emailAddress" class="form-label">Email</label>
            <input type="email" id="emailAddress" class="form-input" required>

            <label for="specialty" class="form-label">Especialidad</label>
            <input type="text" id="specialty" class="form-input">

            <label for="experienceYears" class="form-label">Anos de experiencia</label>
            <input type="number" id="experienceYears" class="form-input" min="0">

            <label for="shiftStart" class="form-label">Horario inicio</label>
            <input type="time" id="shiftStart" class="form-input" required>

            <label for="shiftEnd" class="form-label">Horario fin</label>
            <input type="time" id="shiftEnd" class="form-input" required>

            <label for="status" class="form-label">Estado</label>
            <select id="status" class="form-select">
                <option value="active">Activo</option>
                <option value="inactive">Inactivo</option>
            </select>

            <button type="button" class="form-button" onclick="alert('Barbero registrado localmente (sin backend por ahora).')">Guardar Barbero</button>
        </form>
        <a href="../index.html" class="back-link">Volver al inicio</a>
    </main>
</body>
</html>
