<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Servicio</title>
    <link rel="stylesheet" href="../assets/css/forms.css">
</head>
<body>
    <header class="page-header">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo Barberia" class="brand-logo">
        <h1>Servicios</h1>
    </header>

    <main class="main-content">
        <h2>Crear Nuevo Servicio</h2>
        <form class="input-form" id="serviceForm">
            <label for="name" class="form-label">Nombre del Servicio</label>
            <input type="text" id="name" class="form-input" required>

            <label for="description" class="form-label">Descripción</label>
            <textarea id="description" class="form-input" rows="3" required></textarea>

            <label for="price" class="form-label">Precio ($)</label>
            <input type="number" id="price" class="form-input" step="0.01" min="0" required>

            <label for="duration" class="form-label">Duración (Minutos)</label>
            <input type="number" id="duration" class="form-input" min="1" required>

            <label for="barbershop_id" class="form-label">ID de la Barbería (UUID)</label>
            <input type="text" id="barbershop_id" class="form-input" required placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000">

            <button type="submit" class="form-button">Guardar Servicio</button>
        </form>
        <div id="serviceMessage" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
        <a href="../index.html" class="back-link">Volver al inicio</a>
    </main>

    <script type="module" src="../assets/js/services.js"></script>
</body>
</html>
