<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insumos Registrados</title>
    <link rel="stylesheet" href="../public/css/forms.css">
</head>
<body>

<header>
    <h1>Insumos Registrados - Fábula Dental</h1>
</header>

<main class="form-container">
    <div class="form-card">
        <h2>Listado de insumos</h2>

        <div class="table-wrap">
            <table class="records-table" id="supplyTable">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Código</th>
                        <th>Cantidad Inicial</th>
                        <th>Costo Unitario ($)</th>
                        <th>Fecha Compra</th>
                        <th>Fecha Caducidad</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <p class="empty-state" id="supplyEmpty">No hay insumos registrados.</p>

        <div class="actions-row">
            <a href="./supply-form.html" class="btn btn-secondary">Volver al formulario</a>
            <a href="/" class="btn btn-primary">Ir al inicio</a>
        </div>
    </div>
</main>

<script>
    const tableBody = document.querySelector("#supplyTable tbody");
    const emptyState = document.getElementById("supplyEmpty");

    async function loadSupplies() {
        try {
            const response = await fetch("/api/supplies");
            const records = await response.json();

            if (!response.ok) {
                throw new Error(records.message || "No se pudieron cargar los insumos.");
            }

            if (records.length === 0) {
                document.getElementById("supplyTable").style.display = "none";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            records.forEach((item) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.productName}</td>
                    <td>${item.productCode}</td>
                    <td>${item.productInitialQuantity}</td>
                    <td>${item.productUnitCost}</td>
                    <td>${item.productPurchaseDate}</td>
                    <td>${item.productExpirationDate}</td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            emptyState.textContent = error.message;
            emptyState.style.display = "block";
            document.getElementById("supplyTable").style.display = "none";
        }
    }

    loadSupplies();
</script>

</body>
</html>
