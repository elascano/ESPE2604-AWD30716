<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="page-header">
    <span class="page-header__title">STUDENT REGISTRATION</span>
  </header>
  <main class="wrapper">
    <div class="card">
      <h1 class="card__heading">STUDENT<br>REGISTRATION</h1>
      <form id="registration-form" action="php/guardar.php" method="POST">
        <section class="form-section">
          <div class="section-label">
            <span class="section-label__number">01</span>
            <h2 class="section-label__title">STUDENT INFORMATION</h2>
          </div>
          <div class="field-group">
            <label class="field-group__label" for="full-name">FULL NAME</label>
            <input class="field-group__input" type="text" id="full-name" name="full_name" placeholder="FULL NAME" required />
          </div>
          <div class="field-group">
            <label class="field-group__label" for="id-number">ID NUMBER</label>
            <input class="field-group__input" type="text" id="id-number" name="id_number" placeholder="ID NUMBER" minlength="5" required />
          </div>
          <div class="field-group">
            <label class="field-group__label" for="birth-date">DATE OF BIRTH</label>
            <input class="field-group__input" type="date" id="birth-date" name="birth_date" required />
          </div>
        </section>
        <section class="form-section">
          <div class="section-label">
            <span class="section-label__number">02</span>
            <h2 class="section-label__title">ACADEMIC LEVEL</h2>
          </div>
          <div class="field-group">
            <label class="field-group__label" for="educational-level">EDUCATIONAL LEVEL</label>
            <select class="field-group__select" id="educational-level" name="educational_level" required>
              <option value="Elementary">ELEMENTARY</option>
              <option value="Middle School">MIDDLE SCHOOL</option>
              <option value="High School">HIGH SCHOOL</option>
              <option value="Undergraduate">UNDERGRADUATE</option>
              <option value="Graduate">GRADUATE</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-group__label" for="grade">GRADE</label>
            <input class="field-group__input" type="text" id="grade" name="grade" placeholder="GRADE" required />
          </div>
        </section>
        <section class="form-section">
          <div class="section-label">
            <span class="section-label__number">03</span>
            <h2 class="section-label__title">ALLERGIES OR DISEASES</h2>
          </div>
          <fieldset class="field-group field-group--radio-row">
            <legend class="field-group__label">DO YOU HAVE ANY ALLERGIES OR DISEASES?</legend>
            <div class="radio-row">
              <label class="radio-row__option" for="allergies-yes">
                <input class="radio-row__input" type="radio" id="allergies-yes" name="has_allergies" value="yes" required />
                YES
              </label>
              <label class="radio-row__option" for="allergies-no">
                <input class="radio-row__input" type="radio" id="allergies-no" name="has_allergies" value="no" checked />
                NO
              </label>
            </div>
          </fieldset>
          <div class="field-group">
            <label class="field-group__label" for="medical-description">DESCRIPTION</label>
            <textarea class="field-group__textarea" id="medical-description" name="medical_description" rows="4" placeholder="IMPORTANT MEDICAL DETAILS..."></textarea>
          </div>
        </section>
        <hr class="divider" />
        <button type="submit" class="btn-submit">COMPLETE<br>REGISTRATION</button>
      </form>
    </div>
  </main>
</body>
</html>
