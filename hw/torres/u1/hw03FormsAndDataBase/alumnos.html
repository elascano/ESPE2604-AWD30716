<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>American Latin Class | Alumnos</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-copy">
      <h1>Gestion de alumnos</h1>
      <p>
        Registro base de alumnos por sede, clase, estado academico y beneficio.
      </p>
    </div>
    <img
      src="https://images.unsplash.com/photo-1773020678326-623004d8aa62?auto=format&fit=crop&fm=jpg&q=70&w=900"
      alt="Entrada de una escuela de danza"
    >
  </header>

  <main class="page">
    <nav class="page-nav" aria-label="Formularios del sistema">
      <a href="alumnos.html" class="active" aria-current="page">Alumnos</a>
      <a href="mensualidades.html">Mensualidades</a>
      <a href="asistencia.html">Asistencia</a>
    </nav>

    <section class="branch-guide" aria-label="Colores por sede">
      <span class="branch-pill matriz">Matriz</span>
      <span class="branch-pill norte">Norte</span>
      <span class="branch-pill quitumbe">Quitumbe</span>
      <span class="branch-pill tumbaco">Tumbaco</span>
      <span class="branch-pill conocoto">Conocoto</span>
    </section>

    <section class="module">
      <div class="module-header">
        <div>
          <p class="eyebrow">Formulario</p>
          <h2>Nuevo alumno</h2>
        </div>
        <span class="module-code">RF-009 a RF-018</span>
      </div>

      <form class="form-grid" id="studentForm">
        <label>
          Alumno
          <input type="text" id="studentName" placeholder="Camila Rojas" required>
        </label>

        <label>
          Sede
          <select id="studentBranch">
            <option>Matriz</option>
            <option>Norte</option>
            <option>Quitumbe</option>
            <option>Tumbaco</option>
            <option>Conocoto</option>
          </select>
        </label>

        <label>
          Clase o nivel
          <input type="text" id="studentClass" placeholder="Salsa inicial" required>
        </label>

        <label>
          Estado
          <select id="studentStatus">
            <option>Activo</option>
            <option>Inactivo</option>
          </select>
        </label>

        <label>
          Beca o convenio
          <select id="studentBenefit">
            <option>No aplica</option>
            <option>Beca</option>
            <option>Convenio</option>
          </select>
        </label>

        <label>
          Telefono
          <input type="tel" id="studentPhone" placeholder="099 000 0000" required>
        </label>

        <button type="submit">Agregar alumno</button>
      </form>
      <p id="studentMessage" class="notice" aria-live="polite"></p>

      <div class="table-area">
        <table>
          <thead>
            <tr>
              <th>Alumno</th>
              <th>Sede</th>
              <th>Clase</th>
              <th>Estado</th>
              <th>Beca/Convenio</th>
              <th>Telefono</th>
            </tr>
          </thead>
          <tbody id="studentsTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../script/supabase-config.js"></script>
  <script src="../script/app.js"></script>
</body>
</html>
