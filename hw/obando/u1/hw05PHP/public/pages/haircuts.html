<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita</title>
    <link rel="stylesheet" href="../assets/css/forms.css">
</head>
<body>
    <header class="page-header">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo Barberia" class="brand-logo">
        <h1>Barberia Style</h1>
    </header>

    <main class="main-content">
        <h2>Agendar Cita de Corte</h2>

        <form id="appointmentForm" class="input-form">
            <label for="fullName" class="form-label">Nombre Completo</label>
            <input type="text" id="fullName" class="form-input" placeholder="Tu nombre" required>

            <label for="emailAddress" class="form-label">Correo Electronico</label>
            <input type="email" id="emailAddress" class="form-input" placeholder="tu@email.com" required>

            <label for="phoneNumber" class="form-label">Numero de Telefono</label>
            <input type="tel" id="phoneNumber" class="form-input" placeholder="123-456-7890" required>

            <label for="appointmentDate" class="form-label">Fecha del Corte</label>
            <input type="date" id="appointmentDate" class="form-input" required>

            <label for="appointmentTime" class="form-label">Hora del Corte</label>
            <input type="time" id="appointmentTime" class="form-input" required>

            <label for="haircutType" class="form-label">Tipo de Corte</label>
            <select id="haircutType" class="form-select" required>
                <option value="">-- Selecciona un corte --</option>
                <option value="fade">Mid Fade con Textured Crop</option>
                <option value="mullet">Mullet Moderno (Taper Fade)</option>
                <option value="wolfcut">Wolf Cut (Version Masculina)</option>
            </select>

            <label for="hairType" class="form-label">Tipo de Cabello</label>
            <select id="hairType" class="form-select" required>
                <option value="">-- Selecciona tipo --</option>
                <option value="straight">Lacio</option>
                <option value="wavy">Ondulado</option>
                <option value="curly">Rizo</option>
            </select>

            <button type="submit" class="form-button">Agendar Cita</button>
        </form>

        <a href="../index.html" class="back-link">Volver al inicio</a>
        <a href="haircut-schedule.html" class="back-link">Ver citas registradas</a>
    </main>

    <script src="../assets/js/appointments.model.js"></script>
    <script src="../assets/js/appointments.controller.js"></script>
</body>
</html>
