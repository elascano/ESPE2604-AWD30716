<!DOCTYPE html>
<html lang="es">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Cortes</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>
<body>
    <header class="header">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo Barbería" width="100">
        <h1>Barbería Style</h1>
    </header>

    <div class="content">
        <h2>Agendar Cita de Corte</h2>
        
        <form method="POST" action="php/conexion.php">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required><br><br>
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required><br><br>

            <label for="telefono">Número de Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="123-456-7890" required><br><br>
            
            <label for="fecha">Fecha del Corte:</label>
            <input type="date" id="fecha" name="fecha" required><br><br>

            <label for="hora">Hora del Corte:</label>
            <input type="time" id="hora" name="hora" required><br><br>

            <label for="corte">Tipo de Corte:</label>
            <select id="corte" name="corte" required>
                <option value="">-- Selecciona un corte --</option>
                <option value="fade">Mid Fade con Textured Crop</option>
                <option value="mullet">Mullet Moderno (Taper Fade)</option>
                <option value="wolfcut">Wolf Cut (Versión Masculina)</option>
            </select><br><br>

            <label for="cabello">Tipo de Cabello:</label>
            <select id="cabello" name="cabello" required>
                <option value="">-- Selecciona tipo --</option>
                <option value="lacio">Lacio</option>
                <option value="ondulado">Ondulado</option>
                <option value="rizo">Rizo</option>
            </select><br><br>

            <button type="submit">Agendar Cita</button>
        </form>

        <a href="index.html" class="return">← Volver al inicio</a>
        <a href="horarios.html" class="return">Ver Citas Registradas →</a>
    </div>
     <script src="js/formulario_tabla_recorte.js"></script>
</body>
</html>
