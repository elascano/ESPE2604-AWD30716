<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Cortes</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>

<body>
    <header class="header">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XNhrKkDEh7IS8BD6hQEOpQHaGL?rs=1&pid=ImgDetMain&o=7&rm=3"
            alt="Logo Barbería" width="100">
        <h1>Barbería Style</h1>
    </header>

    <div class="content">
        <form id="formCortes" method="POST" class="cortes_form_container" action="api/conexion.php">
            <center>
                <h2 class="subtitle">Agendar Cita de Corte</h2>
            </center>
            <label for="name">Nombre Completo:</label>
            <input type="text" id="name" name="name" placeholder="Tu nombre" required><br><br>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required><br><br>

            <label for="phone">Número de Teléfono:</label>
            <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required><br><br>

            <label for="date">Fecha del Corte:</label>
            <input type="date" id="date" name="date" required><br><br>

            <label for="time">Hora del Corte:</label>
            <input type="time" id="time" name="time" required><br><br>

            <label for="hair_style">Tipo de Corte:</label>
            <select id="hair_style" name="hair_style" required>
                <option value="">-- Selecciona un corte --</option>
                <option value="fade">Mid Fade con Textured Crop</option>
                <option value="mullet">Mullet Moderno (Taper Fade)</option>
                <option value="wolfcut">Wolf Cut (Versión Masculina)</option>
            </select><br><br>

            <label for="hair_type">Tipo de Cabello:</label>
            <select id="hair_type" name="hair_type" required>
                <option value="">-- Selecciona tipo --</option>
                <option value="lacio">Lacio</option>
                <option value="ondulado">Ondulado</option>
                <option value="rizo">Rizo</option>
            </select><br><br>

            <button type="submit">Agendar Cita</button>
            <div id="mensaje_respuesta" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
        </form>

        <a href="index.html" class="return">← Volver al inicio</a>
        <a href="horarios.html" class="return">Ver Citas Registradas →</a>
    </div>
    <script src="js/formulario_tabla_recorte.js"></script>
</body>

</html>
