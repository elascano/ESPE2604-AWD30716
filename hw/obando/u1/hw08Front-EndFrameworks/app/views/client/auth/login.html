    <!-- Login Form -->
    <main id="main-content" class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 150px);">
        <div class="container-xxl py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8 wow fadeIn" data-wow-delay="0.1s">
                        <div class="form-wrapper mx-auto">
                            <div class="form-header text-center mb-4">
                                <p class="d-inline-block bg-dark text-primary py-1 px-4 mb-3"
                                    style="font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">
                                    Bienvenido de nuevo</p>
                                <h2 class="text-center" style="font-size: 2.2rem;">Inicio de sesión</h2>
                                <p class="text-center mt-2">Ingresa tus credenciales para continuar.</p>
                            </div>
                            <form action="#" method="POST">
                                <div class="row g-4">
                                    <div class="col-12 form-group mb-0 form-animated-element stagger-1">
                                        <label class="form-label-custom" for="username">Usuario</label>
                                        <input type="text" class="form-control-custom" id="username" name="username" placeholder="Ingresa tu usuario" required>
                                    </div>
                                    <div class="col-12 form-group mb-0 form-animated-element stagger-2">
                                        <label class="form-label-custom" for="password">Contraseña</label>
                                        <input type="password" class="form-control-custom" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                                    </div>
                                    <div class="col-12 form-animated-element stagger-3 mt-4">
                                        <button class="btn-submit-custom" type="submit">Iniciar Sesión <i class="fas fa-sign-in-alt ms-2"></i></button>
                                    </div>
                                    <div class="col-12 form-animated-element stagger-4">
                                        <div class="form-footer">
                                            ¿No tienes una cuenta? <a href="/client/register">Regístrate aquí</a>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Login Form End -->
