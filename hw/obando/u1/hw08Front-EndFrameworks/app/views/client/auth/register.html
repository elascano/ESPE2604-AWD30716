    <!-- Register Form -->
    <main id="main-content" class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 150px);">
        <div class="container-xxl py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8 wow fadeIn" data-wow-delay="0.1s">
                        <div class="form-wrapper mx-auto">
                            <div class="form-header text-center mb-4">
                                <p class="d-inline-block bg-dark text-primary py-1 px-4 mb-3"
                                    style="font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">
                                    Únete a nosotras</p>
                                <h2 class="text-center" style="font-size: 2.2rem;">Registro de usuario</h2>
                                <p class="text-center mt-2">Crea tu cuenta para acceder a nuestros servicios.</p>
                            </div>
                            <form action="#" method="POST">
                                <div class="row g-4">
                                    <div class="col-12 form-group mb-0 form-animated-element stagger-1">
                                        <label class="form-label-custom" for="name">Nombre</label>
                                        <input type="text" class="form-control-custom" id="name" name="name" placeholder="Ingresa tu nombre" required>
                                    </div>
                                    <div class="col-12 form-group mb-0 form-animated-element stagger-2">
                                        <label class="form-label-custom" for="email">Correo electrónico</label>
                                        <input type="email" class="form-control-custom" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
                                    </div>
                                    <div class="col-12 form-group mb-0 form-animated-element stagger-3">
                                        <label class="form-label-custom" for="username">Usuario</label>
                                        <input type="text" class="form-control-custom" id="username" name="username" placeholder="Crear tu usuario" required>
                                    </div>
                                    <div class="col-12 form-group mb-0 form-animated-element stagger-4">
                                        <label class="form-label-custom" for="password">Contraseña</label>
                                        <input type="password" class="form-control-custom" id="password" name="password" placeholder="Crear tu contraseña" required>
                                    </div>
                                    <div class="col-12 form-animated-element stagger-5 mt-4">
                                        <button class="btn-submit-custom" type="submit">Registrar <i class="fas fa-user-check ms-2"></i></button>
                                    </div>
                                    <div class="col-12 form-animated-element stagger-5 mt-2">
                                        <div class="form-footer">
                                            ¿Ya tienes una cuenta? <a href="/client/login">Inicia sesión</a>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Register Form End -->
