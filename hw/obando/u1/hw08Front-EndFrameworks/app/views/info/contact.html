<main id="main-content">
    <!-- Contact Start -->
    <div class="container-xxl py-5">
        <div class="container">
            <div class="row g-0">
                <div class="col-lg-6 wow fadeIn" data-wow-delay="0.1s">
                    <div class="form-wrapper w-100" style="max-width: 100%; margin: 0; padding: 3rem;">
                        <div class="form-header text-start mb-4">
                            <p class="d-inline-block bg-dark text-primary py-1 px-4 mb-3"
                                style="font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">
                                Contáctenos</p>
                            <h2 class="text-start" style="font-size: 2.2rem;">¿Tienes alguna pregunta?</h2>
                            <p class="text-start mt-2">No dudes en contactarnos. Normalmente respondemos en un plazo de 24
                                horas.</p>
                        </div>
                        <form>
                            <div class="row g-4">
                                <div class="col-md-6 form-group mb-0 form-animated-element stagger-1">
                                    <label class="form-label-custom" for="name">Tu Nombre</label>
                                    <input type="text" class="form-control-custom" id="name" placeholder="John Doe">
                                </div>
                                <div class="col-md-6 form-group mb-0 form-animated-element stagger-2">
                                    <label class="form-label-custom" for="email">Tu Correo Electrónico</label>
                                    <input type="email" class="form-control-custom" id="email"
                                        placeholder="john@example.com">
                                </div>
                                <div class="col-12 form-group mb-0 form-animated-element stagger-3">
                                    <label class="form-label-custom" for="subject">Asunto</label>
                                    <input type="text" class="form-control-custom" id="subject"
                                        placeholder="¿Cómo podemos ayudarte?">
                                </div>
                                <div class="col-12 form-group mb-0 form-animated-element stagger-4">
                                    <label class="form-label-custom" for="message">Mensaje</label>
                                    <textarea class="form-control-custom" placeholder="Deje su mensaje aquí..."
                                        id="message" style="height: 120px; resize: none;"></textarea>
                                </div>
                                <div class="col-12 form-animated-element stagger-5 mt-2">
                                    <button class="btn-submit-custom" type="submit">Enviar Mensaje<i
                                            class="fa fa-paper-plane ms-2"></i></button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-lg-6 wow fadeIn" data-wow-delay="0.5s">
                    <div class="h-100" style="min-height: 400px;">
                        <iframe class="google-map w-100 h-100"
                            src="https://www.google.com/maps?q=Calle%20In%C3%A9s%20Gangotena%20y%20Avenida%20Atahualpa%2C%20Ecuador&output=embed"
                            frameborder="0" allowfullscreen="" aria-hidden="false" tabindex="0"
                            style="filter: grayscale(100%) invert(92%) contrast(83%); border: 0;"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Contact End -->
</main>
