<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedule Session</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar"><a href="../../../index.html" class="logo">FLOVA</a></nav>
    <form onsubmit="submitAppointment(event)">
        <h2>Schedule Therapy Session</h2>
        <label>Patient DNI</label><input type="text" id="patient_dni" required>
        <label>Therapy Area</label>
        <select id="therapy" required>
            <option value="Traumatological">Traumatological</option>
            <option value="Neurological">Neurological</option>
            <option value="Sports">Sports</option>
        </select>
        <label>Date</label><input type="date" id="app_date" required>
        <button type="submit" class="btn-primary">Confirm Booking</button>
    </form>
    <script src="../../js/app.js"></script>
</body>
</html>
