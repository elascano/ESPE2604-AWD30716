<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenda Records</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="loadAppointments()">
    <nav class="navbar"><a href="../../../index.html" class="logo">FLOVA</a></nav>
    <div class="data-container">
        <h2>Clinical Agenda</h2>
        <input type="text" id="searchInput" class="search-bar" onkeyup="filterTable()" placeholder="Search agenda...">
        <table>
            <thead><tr><th>Patient DNI</th><th>Therapy</th><th>Date</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="../../js/app.js"></script>
</body>
</html>
