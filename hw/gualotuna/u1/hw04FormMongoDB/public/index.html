<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Student Registration Form" />
  <title>Student Registration</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="container">
    <h1>Student Registration</h1>

    <form action="php/guardar.php" method="POST">

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="e.g. John Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="e.g. john.doe@example.com" required />
      </div>

      <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" name="age" placeholder="e.g. 20" required />
      </div>

      <div class="form-group">
        <label for="studentCodingPrefer">Favorite Programming Language</label>
        <input type="text" id="studentCodingPrefer" name="studentCodingPrefer" placeholder="e.g. JavaScript" required />
      </div>

      <button type="submit" class="btn-submit">Register Student</button>

    </form>

    <div style="margin-top: 40px;">
      <h2>Registered Students</h2>
      <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead>
          <tr>
            <th style="padding: 10px;">Full Name</th>
            <th style="padding: 10px;">Email</th>
            <th style="padding: 10px;">Age</th>
            <th style="padding: 10px;">Favorite Language</th>
          </tr>
        </thead>
        <tbody id="tabla-estudiantes">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetch('php/listar.php')
        .then(response => response.json())
        .then(data => {
          const tbody = document.getElementById('tabla-estudiantes');
          if (data.error) {
            tbody.innerHTML = `<tr><td colspan="4" style="color: red; text-align: center;">Error: ${data.error}</td></tr>`;
            return;
          }
          if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 10px;">No records found.</td></tr>`;
            return;
          }
          
          let html = '';
          data.forEach(estudiante => {
            html += `
              <tr>
                <td style="padding: 10px;">${estudiante.fullName || ''}</td>
                <td style="padding: 10px;">${estudiante.email || ''}</td>
                <td style="padding: 10px; text-align: center;">${estudiante.age || ''}</td>
                <td style="padding: 10px; text-align: center;">${estudiante.studentCodingPrefer || ''}</td>
              </tr>
            `;
          });
          tbody.innerHTML = html;
        })
        .catch(err => {
          console.error('Error fetching data:', err);
        });
    });
  </script>
</body>
</html>
