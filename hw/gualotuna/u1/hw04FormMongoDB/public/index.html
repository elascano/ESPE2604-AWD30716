<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Formulario de registro de estudiante" />
  <title>Registro de Estudiante</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="container">
    <h1>Registro de Estudiante</h1>

    <form action="php/guardar.php" method="POST">

      <div class="form-group">
        <label for="fullName">Nombre completo</label>
        <input type="text" id="fullName" name="fullName" placeholder="Ej. Victoria Díaz" required />
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico (email)</label>
        <input type="email" id="email" name="email" placeholder="Ej. cvdiaz3@espe.edu.ec" required />
      </div>

      <div class="form-group">
        <label for="age">Edad</label>
        <input type="number" id="age" name="age" placeholder="Ej. 23" required />
      </div>

      <div class="form-group">
        <label for="studentCodingPrefer">Lenguaje de programación favorito</label>
        <input type="text" id="studentCodingPrefer" name="studentCodingPrefer" placeholder="Ej. C++" required />
      </div>

      <button type="submit" class="btn-submit">Registrar Estudiante</button>

    </form>

    <div style="margin-top: 40px;">
      <h2>Estudiantes Registrados</h2>
      <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead>
          <tr>
            <th style="padding: 10px;">Nombre completo</th>
            <th style="padding: 10px;">Email</th>
            <th style="padding: 10px;">Edad</th>
            <th style="padding: 10px;">Lenguaje Favorito</th>
          </tr>
        </thead>
        <tbody id="tabla-estudiantes">
          <!-- Los datos se cargarán aquí dinámicamente -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetch('php/listar.php')
        .then(response => response.json())
        .then(data => {
          const tbody = document.getElementById('tabla-estudiantes');
          if (data.error) {
            tbody.innerHTML = `<tr><td colspan="4" style="color: red; text-align: center;">Error: ${data.error}</td></tr>`;
            return;
          }
          if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 10px;">No hay registros.</td></tr>`;
            return;
          }
          
          let html = '';
          data.forEach(estudiante => {
            html += `
              <tr>
                <td style="padding: 10px;">${estudiante.fullName || ''}</td>
                <td style="padding: 10px;">${estudiante.email || ''}</td>
                <td style="padding: 10px; text-align: center;">${estudiante.age || ''}</td>
                <td style="padding: 10px; text-align: center;">${estudiante.studentCodingPrefer || ''}</td>
              </tr>
            `;
          });
          tbody.innerHTML = html;
        })
        .catch(err => {
          console.error('Error al obtener datos:', err);
        });
    });
  </script>
</body>
</html>
