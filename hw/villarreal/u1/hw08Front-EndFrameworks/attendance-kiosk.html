<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de asistencia | American Latin Class</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="American Latin Class">
      <span class="brand-mark">ALC</span>
      <span>
        <strong>American Latin Class</strong>
        <small>Registro de asistencia</small>
      </span>
    </a>

    <nav class="main-nav" aria-label="Navegacion principal">
      <a href="index.html">Inicio</a>
      <a href="enrollment.html">Inscripcion</a>
      <a href="attendance-kiosk.html" aria-current="page">Asistencia</a>
      <a href="login.html">Portal</a>
    </nav>
  </header>

  <main class="login-page kiosk-page">
    <section class="login-panel">
      <p class="eyebrow">Entrada a clases</p>
      <h1>Registrar asistencia</h1>
      <form class="form-stack" id="kioskForm">
        <label>
          <span>Cedula del alumno</span>
          <input id="kioskNationalId" type="text" inputmode="numeric" placeholder="1723456789" required>
        </label>
        <button class="button primary" type="submit">Registrar entrada</button>
        <p class="notice" id="kioskMessage" aria-live="polite"></p>
      </form>
      <a class="text-link" href="login.html">Ir al portal interno</a>
    </section>
  </main>

  <script src="script/app.js"></script>
</body>
</html>
