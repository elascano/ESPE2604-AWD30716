<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Chicho University</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon.ico">

    <!-- Custom CSS -->
    <link href="css/style.min.css" rel="stylesheet">
</head>

<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="lds-ripple">
            <div class="lds-pos"></div>
            <div class="lds-pos"></div>
        </div>
    </div>

    <div class="main-wrapper d-flex align-items-center justify-content-center"
        style="min-height: 100vh; background-color: #f2f7f8;">

        <div class="auth-box">
            <div class="card">
                <div class="card-body">

                    <!-- Logo -->
                    <div class="text-center p-b-20">
                        <img src="./assets/images/logo-icon.png" alt="logo">
                        <h4 class="mt-3">Chicho University</h4>
                    </div>

                    <!-- Form -->
                    <form class="form-horizontal mt-12" action="main.html" method="get">

                        <div class="form-group mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" class="form-control" placeholder="ejemplo@chicho.edu.ec" required>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" placeholder="*********" required>
                        </div>

                        <div class="form-group d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label" for="remember">
                                    Recordar Contraseña
                                </label>
                            </div>
                        </div>

                        <div class="form-group text-center mt-4">
                            <button class="btn btn-info w-100 text-white" type="submit">
                                Log In
                            </button>
                        </div>


                    </form>
                </div>
            </div>
        </div>

    </div>

    <script src="./assets/plugins/jquery/dist/jquery.min.js"></script>
    <script src="./assets/plugins/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/custom.js"></script>

</body>

</html>
