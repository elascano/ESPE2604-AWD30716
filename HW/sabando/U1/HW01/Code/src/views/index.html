<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/styles.css">
    <link rel="stylesheet" href="../../public/css/components.css">
    <link rel="stylesheet" href="../../public/css/pages.css">
    <link rel="icon" type="image/x-icon" href="../../public/icon/favicon.ico">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand brand-gradient" href="#">
                <i class="bi bi-book-half"></i> BiblioTech
            </a>
            <div class="d-flex align-items-center">
                <div class="dropdown">
                    <a href="perfil.html" class="btn btn-outline-secondary btn-sm rounded-pill" id="userMenu">
                        <i class="bi bi-person-circle"></i> <span id="nombre-usuario-display">Perfil</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mb-3">Tu Biblioteca Inteligente</h1>
            <p class="lead mb-4" style="opacity: 0.9;">Gestiona préstamos, reservas y devoluciones en tiempo real.</p>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden bg-white">
                        <span class="input-group-text border-0 bg-white ps-4"><i
                                class="bi bi-search text-muted"></i></span>
                        <input type="text" id="input-busqueda" class="form-control border-0"
                            placeholder="Buscar por título, autor o género...">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-secondary fw-bold mb-0">Catálogo de Libros</h4>
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="filtro" id="filtro-todos" checked
                    onchange="filtrarVista('todos')">
                <label class="btn btn-outline-primary rounded-start-pill" for="filtro-todos">Todos</label>

                <input type="radio" class="btn-check" name="filtro" id="filtro-disponibles"
                    onchange="filtrarVista('disponibles')">
                <label class="btn btn-outline-primary" for="filtro-disponibles">Disponibles</label>

                <input type="radio" class="btn-check" name="filtro" id="filtro-mis-libros"
                    onchange="filtrarVista('mis-libros')">
                <label class="btn btn-outline-primary rounded-end-pill" for="filtro-mis-libros">Mis Libros</label>
            </div>
        </div>

        <div id="contenedor-libros" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

            <div class="col">
                <div class="card book-card h-100">
                    <span class="badge badge-status badge-disponible">Disponible</span>

                    <div class="book-cover-placeholder">
                        <i class="bi bi-journal-code"></i>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <div class="toast-container-custom">
        <div id="contenedor-notificaciones"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.js"></script>
</body>

</html>
