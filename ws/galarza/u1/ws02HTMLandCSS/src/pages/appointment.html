<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Schedule Appointment - Physiotherapy</title>
    <link rel="stylesheet" href="../css/appointment.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <strong><mark><a href="features.html">Features</a></mark>
                <a href="appointment.html">Appointment</a>
                <a href="contact.html">Contact Me</a>
        </nav>
        <hr>
    </header>

    <main>
        <center>
            <h1>Schedule Physiotherapy Appointment</h1>
            <p>Please fill out the following form to schedule your appointment.</p>

            <form action="#" method="get">
                <fieldset>
                    <legend>Patient Details</legend>

                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required><br><br>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required><br><br>

                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required><br><br>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Appointment Details</legend>

                    <label for="therapy_type">Reason for Visit / Type of Therapy:</label><br>
                    <select id="therapy_type" name="therapy_type" required>
                        <option value="">Select an option...</option>
                        <option value="sports_injury">Rehabilitation</option>
                        <option value="post_operative">Post-Operative Recovery</option>
                        <option value="manual_therapy">Manual Therapy</option>
                        <option value="other">Other consultation</option>
                    </select><br><br>

                    <label for="date">Preferred Date:</label>
                    <input type="date" id="date" name="date" required><br><br>

                    <label for="time">Preferred Time:</label>
                    <input type="time" id="time" name="time" required><br><br>

                    <label for="symptoms">Briefly describe your symptoms or discomfort:</label><br>
                    <textarea id="symptoms" name="symptoms" rows="5" cols="50" required></textarea><br><br>
                </fieldset>

                <br>

                <button type="submit">Confirm Appointment</button>
                <button type="reset">Clear Form</button>
            </form>
        </center>
    </main>

    <br>
    <hr>
    <footer>
        <p>Physiotherapy Center - 2026</p>
    </footer>
</body>

</html>
