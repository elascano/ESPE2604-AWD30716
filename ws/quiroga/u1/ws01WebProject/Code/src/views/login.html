<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | BiblioTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/styles.css">
    <link rel="stylesheet" href="../../public/css/components.css">
    <link rel="stylesheet" href="../../public/css/pages.css">
    <link rel="icon" type="image/x-icon" href="../../public/icon/favicon.ico">
</head>
<body>

    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="glass-card shadow-lg">
                        <div class="row g-0">
                            <div class="col-lg-6 d-none d-lg-block login-side-image p-5 text-center">
                                <div style="position: relative; z-index: 2;">
                                    <!-- //Aqui esta el icono -->
                                     <img src="../../public/icon/favicon.ico" alt="">
                                    <i class="bi display-1 mb-3"></i>
                                    <h2 class="fw-bold">Bienvenido a BiblioTech</h2>
                                    <p class="opacity-75">Gestiona tus préstamos y descubre nuevo conocimiento en tiempo real.</p>
                                </div>
                            </div>

                            <div class="col-lg-6 p-5 bg-white">
                                <div class="text-center mb-4">
                                    <h3 class="fw-bold text-dark">Iniciar Sesión</h3>
                                    <p class="text-muted small">Ingresa tus credenciales académicas</p>
                                </div>

                                <form id="loginForm">
                                    <div class="mb-4">
                                        <label for="username" class="form-label text-muted small fw-bold">USUARIO</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-light rounded-start-3 ps-3">
                                                <i class="bi bi-person text-primary"></i>
                                            </span>
                                            <input type="text" class="form-control form-control-custom bg-light border-0" id="username" placeholder="Usuario" >
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="password" class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-light rounded-start-3 ps-3">
                                                <i class="bi bi-lock text-primary"></i>
                                            </span>
                                            <input type="password" class="form-control form-control-custom bg-light border-0" id="password" placeholder="Contraseña" >
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-primary-custom w-100 mb-3 shadow">
                                        Ingresar al Sistema
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../controllers/LoginController.js"></script>
</body>
</html>
