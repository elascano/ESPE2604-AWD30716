<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Andino Products Management</title>
    <link rel="stylesheet" th:href="@{/public/styles/styles.css}">
</head>
<body>

<div class="container">
    <h1>Andino Products Management</h1>

    <h2>Add New Product</h2>
    <form th:action="@{/add}" th:object="${product}" method="post">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Product Name:</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Ex. Cookie" required />
            </div>
            <div class="form-group">
                <label for="brand">Brand:</label>
                <input type="text" id="brand" th:field="*{brand}" placeholder="Ex. Havanna" required />
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="flavor">Flavor:</label>
                <input type="text" id="flavor" th:field="*{flavor}" placeholder="Ex. Chocolate" />
            </div>
            <div class="form-group">
                <label for="category">Category:</label>
                <select id="category" th:field="*{category}" required>
                    <option value="" disabled selected>Select a category</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label for="price">Price ($):</label>
            <input type="number" step="0.01" min="0" id="price" th:field="*{price}" placeholder="0.00" required th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''" />
            <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="error-message" style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
        </div>
        
        <button type="submit">Save Product</button>
    </form>

    <h2>Products List</h2>
    <table>
        <thead>
            <tr>
                <th>ID (Hex)</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Flavor</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prod : ${products}">
                <td th:text="${prod.id}" style="font-family: monospace; font-size: 0.9em; color: #7f8c8d;"></td>
                <td th:text="${prod.name}"></td>
                <td th:text="${prod.brand}"></td>
                <td th:text="${prod.flavor}"></td>
                <td th:text="${prod.category}"></td>
                <td th:text="${'$ ' + #numbers.formatDecimal(prod.price, 1, 2)}"></td>
            </tr>

            <tr class="total-row">
                <td colspan="5" style="text-align: right; color: #2c3e50;">Total Prices Sum:</td>
                <td th:text="${'$ ' + #numbers.formatDecimal(totalPrice, 1, 2)}" style="color: #27ae60;"></td>
            </tr>
        </tbody>
    </table>
</div>

<script th:src="@{/public/js/products.js}"></script>
</body>
</html>
